name: Vulture Engine 100K Automated Compiler Pipeline

on:
  schedule:
    # Triggers automatically every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allows you to safely kick off manual compilation loops from the Actions tab

permissions:
  contents: write

concurrency:
  group: vulture-compiler-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-compile:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Codebase
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches full history to ensure rebase alignments calculate references cleanly

    - name: Initialize Enterprise Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Execute Max-Scale Matrix Compilation Loop
      run: |
        echo "🤖 Starting high-velocity Vulture programmatic execution loop..."
        python v100k_incremental_compiler.py

    - name: Commit and Push Fresh Node Batches to Workspace
      run: |
        git config --global user.name "Vulture Engine Bot"
        git config --global user.email "brightlane-bot@users.noreply.github.com"
        
        # 1. Dynamic Catch-Up: Fetch the current live state after the 2-minute build lag
        echo "🔄 Syncing remote references post-compilation..."
        git fetch origin main
        
        # 2. Reset the head pointer to match remote exactly without losing our new XML files
        git reset --mixed origin/main
        
        # 3. Stage only the generated sitemaps and index ledger
        git add sitemap-v10k-node-*.xml sitemap-index.xml || true
        
        if git diff --staged --quiet; then
          echo "No new differential URLs generated in this sequence. Keeping workspace clear."
        else
          # 4. Commit directly on top of the fresh remote head state
          git commit -m "🤖 Vulture Engine Auto-Run: Appended new 100K node clusters [Skip CI]"
          
          # 5. Push specifically using HEAD pointer to guarantee write locking authorization
          echo "🚀 Pushing finalized nodes with upstream protection..."
          git push origin HEAD:main --force-with-lease
        fi

    - name: Global Webmaster Indexation Ping Trigger
      run: |
        echo "📡 Pinging search engine indexes with updated sitemap structural matrix..."
        curl -I "https://www.google.com/ping?sitemap=https://brightlane.github.io/booking/sitemap-index.xml"
        curl -I "https://www.bing.com/ping?sitemap=https://brightlane.github.io/booking/sitemap-index.xml"
