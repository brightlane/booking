name: Generate 3000 Hotel Pages Per Day

on:
  schedule:
    - cron: "0 9 * * *"   # every day at 9:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Ensure slug folders
        run: mkdir -p slugs

      - name: Run 3000‑pages‑per‑day generator
        run: |
          mkdir -p slugs
          node scripts/generate.js

      - name: Commit new / refreshed pages
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add slugs/
          git status
          git commit -m "Generate 3000+ hotel pages for $(date)" || echo "No changes to commit."
          git push
