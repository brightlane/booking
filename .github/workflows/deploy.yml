name: Generate 5000 Hotel Pages DAILY
on:
  workflow_dispatch:     # Manual button
  schedule:              # AUTO 10PM EDT daily
    - cron: '0 2 * * *'  # 2AM UTC = 10PM EDT
  push:
    paths: ['scripts/generate.js']

permissions:
  contents: write

jobs:
  scale:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Allow 25K pages
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Generate 5000+ pages
      run: |
        echo "🚀 Scaling to 5000 pages..."
        node scripts/generate.js
    
    - name: Deploy pages
      run: |
        git config user.name "Daily Scale Bot"
        git config user.email "bot@noreply.github.com"
        git add -A
        HTML_COUNT=$(find slugs -name '*.html' | wc -l)
        git commit -m "Generated $HTML_COUNT pages (5000 x 5 langs) - aid=8132800" || exit 0
        git push origin main --force-with-lease
        echo "✅ Deployed $HTML_COUNT total pages"
    
    - name: Summary
      run: |
        echo "📊 STATS:"
        echo "Pages: $(find slugs -name '*.html' | wc -l)"
        echo "Languages: $(ls -d slugs/*/ 2>/dev/null | wc -l)"
        echo "Next auto-run: Tomorrow 10PM EDT"
