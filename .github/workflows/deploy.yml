name: Generate 5000 Hotel Pages
on:
  workflow_dispatch:  # ← MANUAL RUN BUTTON
  push:
    paths: ['scripts/generate.js']

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with: { node-version: 20 }
    - run: node scripts/generate.js
    - name: Commit pages
      run: |
        git config user.name "Page Generator"
        git config user.email "actions@github.com"
        git add slugs/ sitemap.xml
        git commit -m "Add 5000 hotel pages + sitemap" || exit 0
        git push
