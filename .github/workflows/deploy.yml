name: Generate 5000 Hotel Pages Per Day

on:
  schedule:
    - cron: "0 9 * * *"   # every day at 9:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Ensure data/ and slugs/ folders
        run: |
          mkdir -p data
          mkdir -p slugs

      - name: List files to check data/ contents
        run: |
          ls -la
          ls -la data/
          ls -la scripts/

      - name: Install dependencies (no package-lock.json required)
        run: npm install

      - name: Run generator script (5000+ pages per day, self‑contained)
        run: |
          mkdir -p data
          mkdir -p slugs
          mkdir -p dist
          mkdir -p dist/page
          mkdir -p dist/hotel
          mkdir -p dist/ads
          mkdir -p dist/article
          mkdir -p dist/story
          ls -la
          node scripts/generate.js

      - name: Commit new / refreshed pages
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add slugs/
          git add data/
          git add dist/
          git add index.html
          git add LEGAL.html
          git add 404.html
          git add sitemap.xml
          git add robots.txt
          git status
          git commit -m "Generate 5000+ hotel pages for $(date)" || echo "No changes to commit."
          git push
