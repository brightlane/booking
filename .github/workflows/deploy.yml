name: Generate 5000 Hotel Pages
on: [workflow_dispatch, push]

permissions:
  contents: write  # ← CRITICAL: allows git push

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # ← FIX: gets full history
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Generate pages
      run: node scripts/generate.js
    
    - name: Commit & force push
      run: |
        git config user.name "Hotel Bot"
        git config user.email "bot@noreply.github.com"
        git add -A
        git commit -m "Generated $(find slugs -name '*.html' | wc -l) hotel pages" || exit 0
        git push --force-with-lease  # ← FIX: overrides conflicts
