name: Generate 5000 Hotel Pages
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18
    - run: mkdir -p slugs/{en,fr,de,es,it}/hotel
    - run: node scripts/generate.js
    - run: |
        git config user.name "bot"
        git config user.email "bot@github.com"
        git add .
        git commit -m "5000 pages $(date)" || exit 0
        git push
