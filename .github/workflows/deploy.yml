name: Generate 5000 Hotel Pages

on:
  schedule:
    - cron: "0 9 * * *"     # Daily 9AM UTC
  workflow_dispatch:        # Manual run button

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Create folders
        run: mkdir -p slugs/{en,fr,de,es,it}/hotel data dist
      
      - name: Generate pages
        run: node scripts/generate.js
      
      - name: Commit pages
        run: |
          git config user.name "Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Generated 5000 hotel pages $(date)" || exit 0
          git push
