name: Generate 5000 Hotel Pages Per Day

on:
  schedule:
    - cron: "0 9 * * *"   # Daily 9AM UTC
  workflow_dispatch:     # Manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create folders
        run: |
          mkdir -p data slugs dist/{page,hotel,ads,article,story}

      - name: Generate 5000+ pages (top hotel keywords + auto-refresh)
        run: |
          ls -la scripts/ || echo "scripts/ missing!"
          node scripts/generate.js

      - name: Check output
        run: |
          ls -la slugs/ || echo "slugs/ empty"
          echo "sitemap.xml exists: $(ls sitemap.xml || echo no)"
          head -20 sitemap.xml || echo "no sitemap"

      - name: Commit everything
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -A
          git commit -m "Auto-generate 5000+ hotel pages $(date +%Y-%m-%d)" || echo "No changes"
          git push
