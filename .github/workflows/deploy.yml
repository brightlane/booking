name: Run generator script

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run generator script
        run: |
          ls -la
          mkdir -p dist
          mkdir -p dist/page
          mkdir -p dist/hotel
          mkdir -p dist/ads
          mkdir -p dist/article
          mkdir -p dist/story
          node scripts/generate.js

      - name: Commit generated files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add dist/
          git status
          git commit -m "Generate pages for $(date)" || echo "No changes to commit."
          git push
