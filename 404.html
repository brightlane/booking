<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Page Not Found – HotelGuide26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --primary: #003580;
      --bg: #0a192f;
      --card-bg: #1a2b46;
      --accent: #ff7a00;
      --text: #e0e0e0;
      --lighter: #aaa;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      background: var(--card-bg);
      border: 1px solid #003580;
      padding: 40px 30px;
      border-radius: 12px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    h1 {
      color: #ff7a00;
      margin: 0 0 10px 0;
    }

    p {
      line-height: 1.6;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      background: #ff7a00;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      padding: 12px 20px;
      margin: 14px 0 0 0;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .btn:hover {
      background: #e66e00;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <main>
    <h1>404 – Page Not Found</h1>
    <p>Sorry, the page you’re looking for doesn’t exist or has moved.</p>
    <p>Don’t worry — here are some popular options:</p>
    <p>
      <a class="btn" href="/">Go to Homepage</a>
    </p>
    <footer>
      <small>HotelGuide26 – Best hotel deals in 240+ cities.</small>
    </footer>
  </main>
</body>
</html>
