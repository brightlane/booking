<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow, max-image-preview:large">
    
    <link rel="alternate" hreflang="x-default" href="https://brightlane.github.io/SkyScanner/" />
    <link rel="alternate" hreflang="en-us" href="https://brightlane.github.io/SkyScanner/?lang=en-us" />
    <link rel="alternate" hreflang="es-mx" href="https://brightlane.github.io/SkyScanner/?lang=es-mx" />
    <link rel="alternate" hreflang="fr-fr" href="https://brightlane.github.io/SkyScanner/?lang=fr-fr" />
    <link rel="alternate" hreflang="pt-br" href="https://brightlane.github.io/SkyScanner/?lang=pt-br" />

    <title id="meta-title">Global Stay Matrix | AI-Powered Inventory Sniper 2026</title>
    <meta name="description" content="Direct AI access to 2.5M+ Hotels, Resorts, and Stadium-area inventory. Extracting Mobile-Only and Genius Tier 3 rates globally for the 2026 World Cup.">
    <link rel="canonical" href="https://brightlane.github.io/SkyScanner/" />

    <meta property="og:type" content="website">
    <meta property="og:title" content="Vulture Stay Matrix: Global Inventory Sniper">
    <meta property="og:description" content="Bypassing retail markups for the 2026 World Cup and beyond.">
    <meta property="og:image" content="https://brightlane.github.io/SkyScanner/vulture-og.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "StayFinder Matrix",
        "operatingSystem": "All",
        "applicationCategory": "TravelApplication",
        "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.9", "reviewCount": "1000000" }
      },
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Vulture Global Domination",
        "url": "https://brightlane.github.io/SkyScanner/"
      }
    ]
    </script>

    <style>
        :root { 
            --gold: #ffd700; 
            --dark: #0b1426; 
            --booking-blue: #003580;
            --neon: #00ff41; 
            --slate: #8b949e; 
            --danger: #ff4b2b;
        }
        
        body { 
            margin: 0; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background: var(--dark);
            color: #fff; 
            text-align: center; 
            overflow-x: hidden;
        }

        .hero { padding: 40px 20px; max-width: 600px; margin: 0 auto; }

        .offer-badge {
            background: var(--danger);
            color: white;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h1 { font-size: 2.5rem; line-height: 1.1; margin-bottom: 10px; }
        
        .big-save {
            color: var(--gold);
            font-size: 4rem;
            font-weight: 900;
            margin: 10px 0;
            display: block;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .sub-header { color: #fff; font-size: 1.2rem; opacity: 0.9; margin-bottom: 30px; }

        /* The Deal Card */
        .deal-card {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            color: #333;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .timer-box {
            color: var(--danger);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .search-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-container input {
            padding: 18px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            text-align: center;
        }

        .cta-button {
            background: #006ce4; /* Booking Blue */
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #004a9e;
            transition: all 0.1s;
        }

        .cta-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #004a9e;
        }

        .trust-line {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .urgency-text {
            color: var(--neon);
            font-weight: bold;
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .links { margin-top: 40px; }
        .links a {
            color: var(--slate);
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

<div class="hero">
    <div class="offer-badge">Limited Time Reward</div>
    <h1>Click Now To</h1>
    <span class="big-save">SAVE 50%</span>
    <p class="sub-header">Directly at Booking.com</p>

    <div class="deal-card">
        <div class="timer-box">Deal Expires In: <span id="timer">04:59</span></div>
        
        <div class="search-container">
            <input id="target" placeholder="Enter City" value="New York">
            <button class="cta-button" onclick="go()">ACTIVATE 50% DISCOUNT</button>
        </div>

        <div class="trust-line">
            <span>✓ Verified Partner</span>
            <span>✓ No Fees</span>
            <span>✓ Best Price</span>
        </div>
    </div>

    <p id="live-data" class="urgency-text">🔥 Finding active coupons for New York...</p>

    <div class="links">
        <a href="?city=new-york">New York Deals</a>
        <a href="?city=los-angeles">Los Angeles Deals</a>
        <a href="?city=london">London Deals</a>
    </div>

    <div style="margin-top: 50px; opacity: 0.4; font-size: 0.7rem;">
        *Discounts vary by property. Up to 50% off select Genius properties.
    </div>
</div>

<script>
const AID = "8132800";

function go(){
    const dest = document.getElementById("target").value;
    if(!dest) return;
    // Redirecting to the 'Deals' filter to ensure they see the highest savings
    const url = `https://www.booking.com/searchresults.html?aid=${AID}&ss=${encodeURIComponent(dest)}&order=price&selected_currency=USD&label=save-50-promo`;
    window.location.href = url;
}

// Countdown Timer Logic
let time = 299;
setInterval(() => {
    let m = Math.floor(time / 60);
    let s = time % 60;
    document.getElementById("timer").innerText = `0${m}:${s < 10 ? '0'+s : s}`;
    if(time > 0) time--;
}, 1000);

// Live "Activity" Simulator
function simulateActivity() {
    let cities = ["Paris", "Tokyo", "Miami", "Chicago", "Rome"];
    let city = cities[Math.floor(Math.random()*cities.length)];
    let n = Math.floor(Math.random()*20)+5;
    document.getElementById("live-data").innerText = `🔥 ${n} people just claimed 50% off in ${city}`;
}
setInterval(simulateActivity, 4000);

// Meta & City Logic
const params = new URLSearchParams(window.location.search);
const city = params.get("city");
if(city){
    const c = city.replace(/-/g," ");
    document.getElementById("target").value = c;
    document.getElementById("live-data").innerText = `🔥 High demand for ${c}: Coupons active!`;
}

window.onload = () => {
    document.getElementById("target").select();
};
</script>

</body>
</html>
